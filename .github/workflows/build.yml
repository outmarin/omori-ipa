name: build-ios

on:
  workflow_dispatch:
    inputs:
      build_ipa:
        description: "Also build the unsigned device IPA (slow ~7min). Off for fast debug loops."
        type: boolean
        default: false
  push:
    paths:
      - "ios-patches/**"
      - "config.xml"
      - "package.json"
      - ".github/workflows/build.yml"

jobs:
  build:
    runs-on: macos-14
    timeout-minutes: 90
    env:
      APK_TAG: v1
      BUNDLE_ID: com.poring.omori.ru
    steps:
      - uses: actions/checkout@v4

      - name: Show Xcode / Node
        run: |
          xcodebuild -version
          node --version

      # Cache the built simulator .app. Key excludes ios-patches/ios_compat.js,
      # so JS-only edits hit the cache and we just hot-swap the file (no rebuild).
      - name: Cache built sim app
        id: appcache
        uses: actions/cache@v4
        with:
          path: simapp
          key: omori-simapp-v1-${{ hashFiles('config.xml','package.json','.github/workflows/build.yml','ci/stamp_plist.sh') }}

      # ---- heavy build, only on cache miss (or when making the device IPA) ----
      - name: Full build (cache miss)
        if: ${{ steps.appcache.outputs.cache-hit != 'true' || (github.event_name == 'workflow_dispatch' && github.event.inputs.build_ipa == 'true') }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -e
          npm i -g cordova@12
          which ffmpeg || brew install ffmpeg
          gh release download "$APK_TAG" -p '*.apk' -O game.apk
          mkdir -p extract && unzip -q game.apk 'assets/www/*' -d extract
          mkdir -p www && cp -R extract/assets/www/. www/ && rm -rf extract game.apk
          # inject compat layer BEFORE main.js
          cp ios-patches/ios_compat.js www/js/porting/ios_compat.js
          perl -0pi -e 's{(<script[^>]*src="js/main\.js"></script>)}{<script type="text/javascript" src="js/porting/ios_compat.js"></script>\n    $1}' www/index.html
          grep -q ios_compat www/index.html || { echo "inject failed"; exit 1; }
          # transcode webm cutscenes -> mp4
          shopt -s nullglob
          for f in www/movies/*.webm; do ffmpeg -y -loglevel error -i "$f" -c:v libx264 -pix_fmt yuv420p -profile:v high -c:a aac -b:a 160k -movflags +faststart "${f%.webm}.mp4" && rm "$f"; done
          cordova platform add ios@7 --no-telemetry
          cordova plugin add cordova-plugin-file cordova-plugin-insomnia cordova-plugin-httpd --no-telemetry
          set -o pipefail
          cordova build ios --emulator --debug --no-telemetry 2>&1 | tail -50
          APP=$(find platforms/ios -maxdepth 5 -name "*.app" -path "*imulator*" | head -1)
          [ -z "$APP" ] && APP=$(find platforms/ios -maxdepth 5 -name "*.app" | head -1)
          bash ./ci/stamp_plist.sh "$APP/Info.plist"
          rm -rf simapp && mkdir simapp && cp -R "$APP" simapp/
          echo "cached: $(ls simapp)"

      # ---- always: hot-swap the current ios_compat.js into the (cached) app ----
      - name: Hot-swap ios_compat.js
        run: |
          APP=$(find simapp -maxdepth 1 -name "*.app" | head -1)
          [ -z "$APP" ] && { echo "no app in simapp/"; exit 1; }
          cp ios-patches/ios_compat.js "$APP/www/js/porting/ios_compat.js"
          echo "SIM_APP=$APP" >> $GITHUB_ENV
          echo "hot-swapped into $APP"; head -1 "$APP/www/js/porting/ios_compat.js"

      - name: Boot simulator, install, launch, screenshot
        run: |
          UDID=$(xcrun simctl list devices available --json | python3 -c "import json,sys; d=json.load(sys.stdin)['devices']; c=[x for v in d.values() for x in v if 'iPhone' in x['name']]; print(c[-1]['udid'])")
          echo "sim UDID=$UDID"
          xcrun simctl boot "$UDID" || true
          xcrun simctl bootstatus "$UDID" -b
          # stream device logs in background
          xcrun simctl spawn "$UDID" log stream --level debug --style compact \
            --predicate 'processImagePath CONTAINS "OMORI" OR eventMessage CONTAINS "ios_compat" OR eventMessage CONTAINS "Scene"' > applog.txt 2>&1 &
          LOGPID=$!
          xcrun simctl install "$UDID" "$SIM_APP"
          # NOTE: no --console (it blocks until the app exits); launch returns the pid
          xcrun simctl launch "$UDID" "$BUNDLE_ID" > launch.txt 2>&1 || true
          cat launch.txt
          for t in 12 22 35; do
            sleep $((t - ${last:-0})); last=$t
            xcrun simctl io "$UDID" screenshot "shot_${t}s.png" || true
            echo "screenshot at ${t}s"
          done
          kill $LOGPID 2>/dev/null || true
          echo "==== app container Documents (save layer proof) ===="
          DATA=$(xcrun simctl get_app_container "$UDID" "$BUNDLE_ID" data 2>/dev/null) || true
          echo "container: $DATA"
          ls -la "$DATA/Documents" 2>/dev/null || echo "(no Documents)"
          ls -la "$DATA/Documents/save" 2>/dev/null || echo "(no save dir)"
          echo "---- ios_status.txt ----"; cat "$DATA/Documents/ios_status.txt" 2>/dev/null || echo "(no status file)"
          cp "$DATA/Documents/ios_status.txt" ios_status.txt 2>/dev/null || true

      # ---------- RELEASE: unsigned device .app -> IPA (only on demand) ----------
      - name: Build unsigned device IPA
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.build_ipa }}
        run: |
          cordova build ios --device --release --no-telemetry \
            --buildFlag='CODE_SIGN_IDENTITY=' \
            --buildFlag='CODE_SIGNING_REQUIRED=NO' \
            --buildFlag='CODE_SIGNING_ALLOWED=NO' \
            --buildFlag='DEVELOPMENT_TEAM=' 2>&1 | tail -40 || true
          APP=$(find platforms/ios -maxdepth 6 -name "*.app" -path "*Release-iphoneos*" | head -1)
          [ -z "$APP" ] && APP=$(find platforms/ios -maxdepth 6 -name "*.app" ! -path "*imulator*" | head -1)
          echo "device app: $APP"
          if [ -n "$APP" ]; then
            bash ./ci/stamp_plist.sh "$APP/Info.plist"
            plutil -p "$APP/Info.plist"
            rm -rf Payload OMORI.ipa
            mkdir Payload
            cp -R "$APP" Payload/
            zip -qry OMORI.ipa Payload
            echo "IPA:"; ls -lh OMORI.ipa
          else
            echo "no device .app produced"
          fi

      - name: Upload screenshots + logs (small, fast)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: omori-screens-${{ github.run_number }}
          retention-days: 7
          path: |
            shot_*.png
            applog.txt
            launch.txt
            ios_status.txt

      - name: Upload IPA (large, separate)
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.build_ipa }}
        uses: actions/upload-artifact@v4
        with:
          name: omori-ipa-${{ github.run_number }}
          retention-days: 7
          path: OMORI.ipa
